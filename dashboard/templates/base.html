<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI-Ready Eval{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #141420;
      --bg-raised: #1a1a2e;
      --border: #2a2a3e;
      --border-soft: #1e1e30;
      --text: #e2e8f0;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --accent: #6366f1;
      --accent-h: #818cf8;
      --pass: #22c55e;
      --partial: #f59e0b;
      --fail: #ef4444;
      --grade-a: #22c55e;
      --grade-b: #6366f1;
      --grade-c: #f59e0b;
      --grade-d: #ef4444;
      --font: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "JetBrains Mono", "Fira Code", monospace;
      --sidebar-width: 220px;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      min-height: 100vh;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0;
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .sb-brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .sb-brand-name {
      font-size: 13px; font-weight: 700;
      color: var(--accent-h);
      letter-spacing: 0.5px;
      font-family: var(--mono);
    }
    .sb-brand-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .sb-nav { padding: 10px 0; flex: 1; overflow-y: auto; }
    .sb-section {
      font-size: 10px; font-weight: 700;
      color: var(--text-3);
      padding: 14px 18px 4px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .sb-link {
      display: flex; align-items: center; gap: 9px;
      color: var(--text-2); font-size: 13.5px;
      padding: 8px 18px; cursor: pointer;
      transition: all .15s;
      border-left: 2px solid transparent;
    }
    .sb-link:hover { color: var(--text); background: var(--bg-raised); }
    .sb-link.active {
      color: var(--text);
      background: rgba(99,102,241,.12);
      border-left-color: var(--accent);
    }
    .sb-link i { font-size: 15px; width: 17px; text-align: center; flex-shrink: 0; }
    .sb-link.highlight { color: var(--accent-h); }
    .sb-link.highlight:hover { color: #fff; background: rgba(99,102,241,.15); }

    /* ── Main layout ── */
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
    .topbar {
      background: rgba(10,10,15,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .page-body { padding: 28px; max-width: 1400px; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 12px; font-weight: 700;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── Grid helpers ── */
    .g2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .g12 { display: grid; grid-template-columns: 1fr 2fr; gap: 18px; }
    .g21 { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; }
    @media (max-width: 900px) {
      .g2, .g3, .g4, .g12, .g21 { grid-template-columns: 1fr; }
    }

    /* ── Score display ── */
    .score-big {
      font-size: 56px; font-weight: 700; line-height: 1;
      font-family: var(--mono);
    }
    .score-label { font-size: 12px; color: var(--text-3); margin-top: 6px; }

    /* ── Grade badges ── */
    .grade {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 6px;
      font-size: 12px; font-weight: 700;
      font-family: var(--mono); letter-spacing: .5px;
    }
    .grade-A { background: rgba(34,197,94,.15); color: var(--grade-a); }
    .grade-B { background: rgba(99,102,241,.15); color: var(--grade-b); }
    .grade-C { background: rgba(245,158,11,.15); color: var(--grade-c); }
    .grade-D { background: rgba(239,68,68,.15); color: var(--grade-d); }

    /* ── Layer badges ── */
    .layer-badge {
      display: inline-block;
      font-family: var(--mono); font-size: 10px;
      background: rgba(99,102,241,.12);
      color: var(--accent-h);
      border: 1px solid rgba(99,102,241,.25);
      padding: 1px 7px; border-radius: 4px;
      letter-spacing: .3px;
    }

    /* ── Dimension rows ── */
    .dim-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .dim-row-header {
      padding: 13px 16px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      transition: background .12s;
    }
    .dim-row-header:hover { background: var(--bg-raised); }
    .dim-name { font-weight: 600; font-size: 13.5px; flex: 1; color: var(--text); }
    .dim-score { font-family: var(--mono); font-size: 14px; font-weight: 600; margin-right: 10px; }
    .bar-sm { height: 5px; border-radius: 3px; background: var(--border); width: 90px; overflow: hidden; flex-shrink: 0; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .toggle-icon { color: var(--text-3); font-size: 13px; transition: transform .2s; flex-shrink: 0; }
    .dim-body { padding: 0 16px 14px; display: none; }
    .dim-body.open { display: block; }

    /* ── Check items ── */
    .chk { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border-soft); font-size: 13px; }
    .chk:last-child { border-bottom: none; }
    .chk-icon { margin-top: 1px; flex-shrink: 0; font-size: 14px; }
    .chk-pass { color: var(--pass); }
    .chk-partial { color: var(--partial); }
    .chk-fail { color: var(--fail); }

    /* ── Pills ── */
    .issue-pill {
      background: rgba(239,68,68,.1); color: #fca5a5;
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 6px; padding: 5px 10px;
      font-size: 12px; margin-bottom: 4px;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .rec-pill {
      background: rgba(99,102,241,.1); color: var(--accent-h);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 6px; padding: 5px 10px;
      font-size: 12px; margin-bottom: 4px;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .info-pill {
      background: rgba(148,163,184,.08); color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px;
      font-size: 12px; margin-bottom: 4px;
      display: flex; align-items: flex-start; gap: 6px;
    }

    /* ── Weight detail ── */
    .weight-detail {
      display: none;
      background: var(--bg-raised); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px;
      font-size: 12px; color: var(--text-2); margin-top: 8px;
      font-family: var(--mono);
    }
    .weight-detail.show { display: block; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 7px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; transition: all .15s;
      font-family: var(--font);
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-outline {
      background: transparent; color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { background: var(--bg-raised); color: var(--text); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-ghost { background: transparent; color: var(--text-3); border: none; }
    .btn-ghost:hover { color: var(--text-2); }

    /* ── Demo banner ── */
    .demo-banner {
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.3);
      border-radius: 8px; padding: 10px 16px;
      font-size: 13px; color: #fcd34d; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 80px 40px;
      color: var(--text-3);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; color: var(--text-3); }
    .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; margin-bottom: 24px; }

    /* ── Stat mini ── */
    .stat { padding: 0; }
    .stat-value { font-size: 32px; font-weight: 700; font-family: var(--mono); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--text-3); margin-top: 5px; text-transform: uppercase; letter-spacing: .8px; }

    /* ── Progress bar ── */
    .progress { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 3px; transition: width .4s; }

    /* ── Misc ── */
    .text-pass { color: var(--pass); }
    .text-partial { color: var(--partial); }
    .text-fail { color: var(--fail); }
    .text-accent { color: var(--accent-h); }
    .text-muted { color: var(--text-3); }
    .text-2 { color: var(--text-2); }
    .mono { font-family: var(--mono); }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 14px; }
    .mb-4 { margin-bottom: 20px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 14px; }
    .gap-2 { gap: 8px; }
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    hr.dim-sep { border: none; border-top: 1px solid var(--border-soft); margin: 10px 0; }
    code { font-family: var(--mono); font-size: 12px; background: var(--bg-raised); padding: 1px 5px; border-radius: 3px; color: var(--accent-h); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-name">AI-READY EVAL</div>
      <div class="sb-brand-sub">Agent Quality System</div>
    </div>
    <div class="sb-nav">
      <div class="sb-section">主页</div>
      <a href="{{ url_for('index') }}" class="sb-link {% if request.endpoint == 'index' %}active{% endif %}">
        <i class="bi bi-house-fill"></i> 产品首页
      </a>
      <div class="sb-section">评估</div>
      <a href="{{ url_for('skill_eval_detail') }}" class="sb-link highlight {% if request.endpoint == 'skill_eval_detail' %}active{% endif %}">
        <i class="bi bi-lightning-fill"></i> Skill 评估
      </a>
      <a href="{{ url_for('api_eval_detail') }}" class="sb-link highlight {% if request.endpoint == 'api_eval_detail' %}active{% endif %}">
        <i class="bi bi-plug-fill"></i> API 测试
      </a>
      <div class="sb-section">工具</div>
      <a href="{{ url_for('settings_page') }}" class="sb-link {% if request.endpoint == 'settings_page' %}active{% endif %}">
        <i class="bi bi-gear-fill"></i> LLM 设置
      </a>
      <a href="{{ url_for('trends') }}" class="sb-link {% if request.endpoint == 'trends' %}active{% endif %}">
        <i class="bi bi-graph-up"></i> 趋势
      </a>
      <a href="https://github.com/zzxtbeta/ai-ready-eval-system" class="sb-link" target="_blank" rel="noopener">
        <i class="bi bi-github"></i> GitHub
      </a>
    </div>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">{% block page_title %}概览{% endblock %}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <a href="{{ url_for('settings_page') }}" class="btn btn-outline btn-sm"
           title="LLM 设置" id="settings-btn"
           style="{% if request.endpoint == 'settings_page' %}background:rgba(99,102,241,.12);color:var(--accent-h);border-color:rgba(99,102,241,.3);{% endif %}">
          <i class="bi bi-gear-fill"></i> 设置
        </a>
        <a href="{{ url_for('skill_eval_detail') }}" class="btn btn-outline btn-sm">
          <i class="bi bi-lightning-fill"></i> Skill
        </a>
        <a href="{{ url_for('api_eval_detail') }}" class="btn btn-primary btn-sm">
          <i class="bi bi-plug-fill"></i> API
        </a>
      </div>
    </div>
    <div class="page-body">
      {% block content %}{% endblock %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    // Dimension accordion
    document.addEventListener('click', function(e) {
      var hdr = e.target.closest('.dim-row-header');
      if (!hdr) return;
      var body = hdr.nextElementSibling;
      if (body && body.classList.contains('dim-body')) {
        body.classList.toggle('open');
        var icon = hdr.querySelector('.toggle-icon');
        if (icon) icon.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
      }
    });
    // Weight toggle
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-weight-toggle]');
      if (btn) {
        var el = document.getElementById(btn.dataset.weightToggle);
        if (el) el.classList.toggle('show');
      }
    });
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
